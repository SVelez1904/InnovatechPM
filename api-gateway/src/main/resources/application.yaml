server:
  port: 8083

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: gestion-proyectos
          uri: http://api-proyectos:8081
          predicates:
            - Path=/api/proyectos/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway